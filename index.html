<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 자취 체크리스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f7fa;font-family:sans-serif;padding-bottom:80px}

.top-bar{position:fixed;top:0;left:0;right:0;background:#3b5bdb;color:#fff;z-index:200;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top-bar .ttl{font-size:16px;font-weight:700;letter-spacing:.5px}
.top-bar .sub{font-size:11px;opacity:.7;margin-top:2px}
.reset-btn{background:none;border:1.5px solid rgba(255,255,255,.4);border-radius:8px;padding:5px 12px;font-size:11px;color:#fff;cursor:pointer;font-family:inherit}
.reset-btn:hover{background:rgba(255,255,255,.15)}

.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8eaf0;display:flex;z-index:100;box-shadow:0 -2px 8px rgba(59,91,219,.08)}
.tb{flex:1;padding:9px 0 7px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#adb5bd;font-family:inherit;transition:color .15s}
.tb.active{color:#3b5bdb;font-weight:700}
.tb .ic{font-size:20px;line-height:1}

.tab-content{display:none;padding:0 14px 14px;max-width:600px;margin:0 auto}
.tab-content.active{display:block}

.section-box{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(59,91,219,.07);border:1px solid #e8eaf0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:14px;font-weight:700;color:#3b5bdb;display:flex;align-items:center;gap:6px}
.section-count{font-size:11px;color:#adb5bd;background:#f1f3f9;border-radius:10px;padding:2px 8px}

.progress-wrap{margin-bottom:10px}
.progress-bar{height:6px;background:#e8eaf0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b5bdb,#748ffc);transition:width .4s}
.progress-text{font-size:10px;color:#adb5bd;margin-top:3px;text-align:right}

.check-item{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid #f1f3f9;transition:all .2s}
.check-item:last-child{border-bottom:none}
.check-item.done .item-name{color:#ced4da;text-decoration:line-through;text-decoration-color:#ced4da}
.ox-btn{width:30px;height:30px;border-radius:50%;border:2px solid #dee2e6;background:#fff;font-size:12px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700;font-family:inherit}
.ox-btn.o{border-color:#3b5bdb;background:#3b5bdb;color:#fff}
.ox-btn.x{border-color:#dee2e6;background:#f8f9fa;color:#ced4da}
.item-name{flex:1;font-size:13px;color:#333;outline:none;border:none;background:transparent;font-family:inherit;cursor:text;min-width:0}
.item-name:focus{color:#3b5bdb}
.del-btn{background:none;border:none;color:#dee2e6;cursor:pointer;font-size:16px;flex-shrink:0;line-height:1}
.del-btn:hover{color:#fa5252}

.add-row{display:flex;gap:6px;margin-top:10px}
.add-inp{flex:1;border:1.5px solid #e8eaf0;border-radius:8px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit;background:#fff;color:#333;min-width:0}
.add-inp:focus{border-color:#3b5bdb}
.add-btn{background:#3b5bdb;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:18px;cursor:pointer;flex-shrink:0;font-weight:700}

/* 2분할 그리드 */
.two-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.two-grid{grid-template-columns:1fr}}

/* 우선순위 별 */
.star-toggle{background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;padding:0 2px;opacity:.25;transition:all .15s}
.star-toggle.urgent{opacity:1}
.check-item.urgent{background:#fff8e6;border-radius:8px;margin:0 -6px;padding:8px 6px}
.check-item.urgent .item-name{color:#b8860b;font-weight:600}

/* 장보기 모드 토글 */
.shop-toggle-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(59,91,219,.07);border:1px solid #e8eaf0}
.shop-toggle-label{font-size:13px;font-weight:700;color:#333;display:flex;align-items:center;gap:6px}
.shop-toggle-sub{font-size:10px;color:#adb5bd;margin-top:2px}
.switch{position:relative;width:46px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider-switch{position:absolute;cursor:pointer;inset:0;background:#dee2e6;border-radius:26px;transition:.25s}
.slider-switch:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
input:checked + .slider-switch{background:#ff8c42}
input:checked + .slider-switch:before{transform:translateX(20px)}

/* 장보기 모드일 때 표시 */
body.shopping-mode .top-bar{background:#ff8c42}
.shop-banner{display:none;background:linear-gradient(135deg,#ff8c42,#ffac42);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;text-align:center}
body.shopping-mode .shop-banner{display:block}
.shop-banner .sb-title{font-size:15px;font-weight:700;margin-bottom:2px}
.shop-banner .sb-sub{font-size:11px;opacity:.9}
body.shopping-mode .non-shop-item{display:none}
.shop-empty{text-align:center;color:#ced4da;font-size:13px;padding:20px;display:none}
body.shopping-mode .shop-empty.shop-mode-only{display:block}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;display:none;z-index:999;white-space:nowrap}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="ttl">🏠 자취 체크리스트</div>
    <div class="sub" id="top-sub">로딩 중...</div>
  </div>
  <button class="reset-btn" onclick="resetAll()">전체 초기화</button>
</div>

<div style="padding:64px 14px 0;max-width:600px;margin:0 auto">
  <div class="shop-toggle-row">
    <div>
      <div class="shop-toggle-label">🛒 장보기 모드</div>
      <div class="shop-toggle-sub">없는 것(X)만 모아서 보여줘요</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="shop-mode-toggle" onchange="toggleShopMode()">
      <span class="slider-switch"></span>
    </label>
  </div>
  <div class="shop-banner" id="shop-banner">
    <div class="sb-title">🛒 장보기 모드 ON</div>
    <div class="sb-sub">없는 항목만 보여드릴게요. 사면 바로 체크하세요!</div>
  </div>
</div>

<!-- 탭1: 청소/화장실 -->
<div class="tab-content active" id="tab-clean">
  <div class="two-grid">
    <div class="section-box">
      <div class="section-header">
        <div class="section-title">🧹 청소용품</div>
        <span class="section-count" id="cnt-clean"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-clean"></div></div>
        <div class="progress-text" id="prog-text-clean"></div>
      </div>
      <div id="list-clean"></div>
      <div class="add-row">
        <input type="text" class="add-inp" id="inp-clean" placeholder="추가..." onkeydown="if(event.key==='Enter')addItem('clean')">
        <button class="add-btn" onclick="addItem('clean')">+</button>
      </div>
    </div>
    <div class="section-box">
      <div class="section-header">
        <div class="section-title">🚿 화장실</div>
        <span class="section-count" id="cnt-bath"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-bath"></div></div>
        <div class="progress-text" id="prog-text-bath"></div>
      </div>
      <div id="list-bath"></div>
      <div class="add-row">
        <input type="text" class="add-inp" id="inp-bath" placeholder="추가..." onkeydown="if(event.key==='Enter')addItem('bath')">
        <button class="add-btn" onclick="addItem('bath')">+</button>
      </div>
    </div>
  </div>
</div>

<!-- 탭2: 생활용품 (생필품 + 주방) -->
<div class="tab-content" id="tab-life">
  <div class="two-grid">
    <div class="section-box">
      <div class="section-header">
        <div class="section-title">🏠 생필품</div>
        <span class="section-count" id="cnt-life"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-life"></div></div>
        <div class="progress-text" id="prog-text-life"></div>
      </div>
      <div id="list-life"></div>
      <div class="add-row">
        <input type="text" class="add-inp" id="inp-life" placeholder="추가..." onkeydown="if(event.key==='Enter')addItem('life')">
        <button class="add-btn" onclick="addItem('life')">+</button>
      </div>
    </div>
    <div class="section-box">
      <div class="section-header">
        <div class="section-title">🍳 주방</div>
        <span class="section-count" id="cnt-kitchen"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-kitchen"></div></div>
        <div class="progress-text" id="prog-text-kitchen"></div>
      </div>
      <div id="list-kitchen"></div>
      <div class="add-row">
        <input type="text" class="add-inp" id="inp-kitchen" placeholder="추가..." onkeydown="if(event.key==='Enter')addItem('kitchen')">
        <button class="add-btn" onclick="addItem('kitchen')">+</button>
      </div>
    </div>
  </div>
</div>

<!-- 탭3: 식료품 (냉장고 + 양념) -->
<div class="tab-content" id="tab-food">
  <div class="two-grid">
    <div class="section-box">
      <div class="section-header">
        <div class="section-title">🧊 냉장고</div>
        <span class="section-count" id="cnt-fridge"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-fridge"></div></div>
        <div class="progress-text" id="prog-text-fridge"></div>
      </div>
      <div id="list-fridge"></div>
      <div class="add-row">
        <input type="text" class="add-inp" id="inp-fridge" placeholder="추가..." onkeydown="if(event.key==='Enter')addItem('fridge')">
        <button class="add-btn" onclick="addItem('fridge')">+</button>
      </div>
    </div>
    <div class="section-box">
      <div class="section-header">
        <div class="section-title">🧂 양념</div>
        <span class="section-count" id="cnt-sauce"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-sauce"></div></div>
        <div class="progress-text" id="prog-text-sauce"></div>
      </div>
      <div id="list-sauce"></div>
      <div class="add-row">
        <input type="text" class="add-inp" id="inp-sauce" placeholder="추가..." onkeydown="if(event.key==='Enter')addItem('sauce')">
        <button class="add-btn" onclick="addItem('sauce')">+</button>
      </div>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tb active" id="tbtn-clean" onclick="goTab('clean')"><span class="ic">🧹</span>청소/화장실</button>
  <button class="tb" id="tbtn-life" onclick="goTab('life')"><span class="ic">🏠</span>생활용품</button>
  <button class="tb" id="tbtn-food" onclick="goTab('food')"><span class="ic">🛒</span>식료품</button>
</nav>

<div class="toast" id="toast"></div>

<script>
var SAVE_KEY='home_checklist_v1';
var CATS=['clean','bath','life','kitchen','fridge','sauce'];
var data={};
var DEFAULTS={
  clean:['청소기','밀대/걸레','욕실 청소 솔','화장실 세제','다용도 세제','쓰레기봉투','물티슈','유리 세정제'],
  bath: ['샴푸','컨디셔너','바디워시','폼클렌저','치약','칫솔','면도기','화장솜','면봉','생리대'],
  life: ['휴지','키친타월','세탁세제','섬유유연제','비닐봉지','건전지','우산','라이터'],
  kitchen:['주방세제','수세미','랩/호일','지퍼백','종이컵','일회용 수저','행주'],
  fridge:['계란','우유','두부','채소','과일','고기','김치','음료수','버터'],
  sauce: ['소금','설탕','간장','된장','고추장','식용유','참기름','고춧가루','다진마늘','후추','식초']
};

function load(){
  try{ var r=localStorage.getItem(SAVE_KEY); if(r) data=JSON.parse(r); else initDefaults(); }
  catch(e){ initDefaults(); }
  CATS.forEach(function(cat){
    if(!data[cat]) data[cat]=DEFAULTS[cat].map(function(n){return {id:uid(),name:n,checked:true};});
  });
}
function initDefaults(){
  data={};
  CATS.forEach(function(cat){
    data[cat]=DEFAULTS[cat].map(function(n){return {id:uid(),name:n,checked:true};});
  });
}
function uid(){return Date.now()+''+Math.floor(Math.random()*10000);}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(data));}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(function(){t.style.display='none';},1400);}

function goTab(id){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tb').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('tbtn-'+id).classList.add('active');
}

function renderAll(){ CATS.forEach(function(c){renderCat(c);}); updateTop(); }

function renderCat(cat){
  var items=(data[cat]||[]).slice();
  var el=document.getElementById('list-'+cat); if(!el) return;

  // 정렬: 긴급(urgent) 우선 -> 없는것(X) -> 있는것(O)
  items.sort(function(a,b){
    if(!!a.urgent !== !!b.urgent) return a.urgent ? -1 : 1;
    if(a.checked !== b.checked) return a.checked ? 1 : -1;
    return 0;
  });

  if(items.length===0){
    el.innerHTML='<div class="shop-empty">항목이 없어요</div>';
    return;
  }

  var html = items.map(function(item){
    var isShopTarget = !item.checked; // 장보기모드에서 보여줄 대상 = 없는 것
    return '<div class="check-item'+(item.checked?'':' done')+(item.urgent?' urgent':'')+(isShopTarget?'':' non-shop-item')+'">'
      +'<button class="ox-btn '+(item.checked?'o':'x')+'" onclick="toggle(\''+cat+'\',\''+item.id+'\')">'+(item.checked?'O':'X')+'</button>'
      +'<span class="item-name" contenteditable="true" onblur="rename(\''+cat+'\',\''+item.id+'\',this.textContent)">'+escHtml(item.name)+'</span>'
      +'<button class="star-toggle'+(item.urgent?' urgent':'')+'" onclick="toggleUrgent(\''+cat+'\',\''+item.id+'\')" title="긴급 표시">⭐</button>'
      +'<button class="del-btn" onclick="del(\''+cat+'\',\''+item.id+'\')">−</button>'
      +'</div>';
  }).join('');

  var noneNeeded = items.every(function(i){return i.checked;});
  if(noneNeeded){
    html += '<div class="shop-empty shop-mode-only" id="empty-'+cat+'">🎉 살 게 없어요!</div>';
  }

  el.innerHTML = html;

  var total=items.length, done=items.filter(function(i){return i.checked;}).length;
  var pct=total>0?Math.round(done/total*100):0;
  var pf=document.getElementById('prog-'+cat); if(pf) pf.style.width=pct+'%';
  var pt=document.getElementById('prog-text-'+cat); if(pt) pt.textContent=done+'/'+total+' ('+pct+'%)';
  var cn=document.getElementById('cnt-'+cat); if(cn) cn.textContent=done+'/'+total;
}

function updateTop(){
  var total=0,done=0;
  CATS.forEach(function(c){var it=data[c]||[];total+=it.length;done+=it.filter(function(i){return i.checked;}).length;});
  document.getElementById('top-sub').textContent='전체 '+done+'/'+total+' 보유 중';
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggle(cat,id){
  var item=data[cat].find(function(i){return i.id===id;}); if(!item) return;
  item.checked=!item.checked; save(); renderCat(cat); updateTop();
}
function toggleUrgent(cat,id){
  var item=data[cat].find(function(i){return i.id===id;}); if(!item) return;
  item.urgent=!item.urgent; save(); renderCat(cat);
}
function toggleShopMode(){
  var on=document.getElementById('shop-mode-toggle').checked;
  document.body.classList.toggle('shopping-mode', on);
  localStorage.setItem('home_checklist_shopmode', on?'1':'0');
}
function rename(cat,id,val){
  var item=data[cat].find(function(i){return i.id===id;}); if(!item) return;
  item.name=val.trim()||item.name; save();
}
function del(cat,id){
  data[cat]=data[cat].filter(function(i){return i.id!==id;}); save(); renderCat(cat); updateTop();
}
function addItem(cat){
  var inp=document.getElementById('inp-'+cat);
  var name=inp.value.trim(); if(!name){toast('항목을 입력해주세요!');return;}
  data[cat].push({id:uid(),name:name,checked:true}); inp.value='';
  save(); renderCat(cat); updateTop(); toast('✅ 추가됐어요!');
}
function resetAll(){
  if(!confirm('모든 체크를 초기화할까요?\n(항목은 유지되고 O/X만 리셋돼요)')) return;
  CATS.forEach(function(c){data[c].forEach(function(i){i.checked=true;});});
  save(); renderAll(); toast('초기화됐어요!');
}

load(); renderAll();
if(localStorage.getItem('home_checklist_shopmode')==='1'){
  document.getElementById('shop-mode-toggle').checked=true;
  document.body.classList.add('shopping-mode');
}
</script>
</body>
</html>
